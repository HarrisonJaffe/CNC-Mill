# =============================================================================
#  printer.cfg  —  Dual-Tool CNC Mill + Solder Paste Dispenser
#  Board   : BTT Octopus Pro V1.1  (STM32H723)
#  Host    : Raspberry Pi 4B or 5  (USB connection)
#  Tool 0  : CNC Spindle    — X/Y/Z axes
#  Tool 1  : Paste Dispenser — X/Y shared, independent paste_z + paste_extruder
#  Motors  : All NEMA 17, 1.8°, 1.5A rated
#  Drives  : All T8 lead screw, 8mm lead (2mm pitch, 4 start)
# =============================================================================
#
# ╔══════════════════════════════════════════════════════════════════════════╗
# ║  READ BEFORE FIRST POWER-ON                                             ║
# ╠══════════════════════════════════════════════════════════════════════════╣
# ║                                                                          ║
# ║  1. FIRMWARE BUILD  (run on the Pi before first boot)                   ║
# ║     cd ~/klipper && make menuconfig                                      ║
# ║     Set:  Micro-controller = STM32F446                                  ║
# ║           Bootloader offset = 32KiB                                     ║
# ║           Clock reference  = 12 MHz crystal                             ║
# ║     make  →  copy klipper.bin to SD card as firmware.bin                ║
# ║     Insert SD, power on board to flash.                                 ║
# ║                                                                          ║
# ║  2. OCTOPUS PRO V1.1 JUMPER SETUP                                       ║
# ║     a. DIAG jumpers:  REMOVE ALL from all motor slots.                  ║
# ║     b. UART jumpers:  ONE per driver slot only.                         ║
# ║     c. MOT_PWR:       Set to VIN on all active driver slots.            ║
# ║     d. USB 5V jumper: REMOVE.                                           ║
# ║     e. VFAN jumper:   Set to 5V — NOT 12V or VIN.                      ║
# ║                                                                          ║
# ║  3. DUAL POWER INPUT — CRITICAL                                          ║
# ║     PWR terminal   -> board logic power  (PSU V+ / V-)                  ║
# ║     MOTOR_PWR      -> driver power       (PSU V+ / V-)                  ║
# ║     Both must be wired separately.                                      ║
# ║                                                                          ║
# ║  4. ENDSTOP WIRING — PC817 HY-M158 MODULE                              ║
# ║     All sensors wired through PC817 optocoupler module.                 ║
# ║     Output side: 30kohm resistors between 5V and signal pin.            ║
# ║     No MCU internal pull-up (no ^ prefix on pins).                      ║
# ║     Inverted logic (! prefix on all pins).                              ║
# ║     Signal reads HIGH (~3.44V) at rest = open                           ║
# ║     Signal reads LOW (<0.8V) when triggered = triggered                 ║
# ║                                                                          ║
# ║  5. SPINDLE CONTROLLER — DAEDALUS SPEED CONTROLLER                     ║
# ║     EN pin logic (INVERTED):                                            ║
# ║       EN LOW  (0V)   = spindle RUNS                                     ║
# ║       EN HIGH (5V)   = spindle STOPPED                                  ║
# ║                                                                          ║
# ║     PA8 output logic:                                                   ║
# ║       VALUE=0 → PA8 HIGH (~5V) → EN HIGH → spindle STOPPED             ║
# ║       VALUE=1 → PA8 LOW  (~0V) → EN LOW  → spindle RUNS                ║
# ║                                                                          ║
# ║     Wiring:                                                             ║
# ║       PA8 (FAN0 bottom pin) → EN on controller                         ║
# ║       PE5 (FAN1 bottom pin) → SV on controller                         ║
# ║       FAN6 GND pin          → GND on controller                        ║
# ║       VF0 → 10kΩ resistor → PA8  (pull-up, prevents startup spin)      ║
# ║       VFAN jumper MUST be set to 5V                                    ║
# ║                                                                          ║
# ║  6. X AXIS LEAD SCREW — VERIFY BEFORE HOMING                            ║
# ║     Assumed 8mm lead. If rod is 4mm lead, find *** X_LEAD ***           ║
# ║     and change rotation_distance to 4.                                  ║
# ║                                                                          ║
# ║  7. MOTOR DIRECTION — CHECK ON FIRST HOME                               ║
# ║     Add or remove ! before dir_pin if axis moves wrong way.             ║
# ║       dir_pin: PF12  ->  dir_pin: !PF12                                 ║
# ║                                                                          ║
# ║  8. CALIBRATE rotation_distance BEFORE CUTTING ANYTHING                 ║
# ║     new_rotation_distance = old x (actual_mm / commanded_mm)            ║
# ║                                                                          ║
# ║  9. CONFIRMED VALID STOP PINS ON THIS BOARD                             ║
# ║     Stop0=PG6  Stop1=PG9  Stop2=PG10  Stop3=PG11  Stop4=PG12           ║
# ║     Stop5=PG13  Stop6=PG14  Stop7=PG15                                  ║
# ║     PG7 and PG8 are NOT valid endstop pins on this board.               ║
# ║                                                                          ║
# ║  10. PASTE Z SAFETY LIMITS — NOT YET INSTALLED                          ║
# ║     Paste Z upper and lower limits removed for now.                     ║
# ║     PG13 and PG14 repurposed for X max and Y max safety.               ║
# ║                                                                          ║
# ╚══════════════════════════════════════════════════════════════════════════╝

# =============================================================================
# MAINSAIL
# =============================================================================
[include mainsail.cfg]

# =============================================================================
# FORCE MOVE — allows manual motor movement for testing
# =============================================================================
[force_move]
enable_force_move: True

# =============================================================================
# MCU — serial port confirmed
# =============================================================================
[mcu]
serial: REPLACE_WITH_YOUR_SERIAL
# Find your board ID with: ls /dev/serial/by-id/
restart_method: command

# =============================================================================
# PRINTER KINEMATICS
# =============================================================================
[printer]
kinematics: cartesian
max_velocity:20          # mm/s  — tune up after calibration
max_accel: 50            # mm/s2 — low accel preserves CNC accuracy
max_z_velocity: 8        # mm/s  — slow Z protects lead screws
max_z_accel: 4

# =============================================================================
# X AXIS  ->  MOTOR0  |  T8 lead screw, assumed 8mm lead
# Homing endstop : X min (left)  = Stop0 (PG6)
# Safety endstop : X max (right) = Stop5 (PG13) [filament_switch_sensor below]
# =============================================================================
[stepper_x]
step_pin: PF13
dir_pin: PF12             # <- Add ! if X homes toward right instead of left
enable_pin: !PF14
rotation_distance: 4
microsteps: 16
full_steps_per_rotation: 200
endstop_pin: !PG6         # X min (left) — Stop0 — confirmed working
                          # Remove ! if reads triggered at rest
position_min: 0
position_endstop: 0
position_max: 384.175
homing_speed: 5
homing_retract_dist: 5

[tmc2209 stepper_x]
uart_pin: PC4
run_current: 1.060
hold_current: 0.500
stealthchop_threshold: 0  # SpreadCycle for CNC accuracy
interpolate: True

# =============================================================================
# Y AXIS  ->  MOTOR1  |  Iverntech integrated motor, confirmed 8mm lead
# Homing endstop : Y min (front) = Stop1 (PG9)
# Safety endstop : Y max (back)  = Stop6 (PG14) [filament_switch_sensor below]
# =============================================================================
[stepper_y]
step_pin: PG0
dir_pin: PG1              # <- Add ! if Y homes toward back instead of front
enable_pin: !PF15
rotation_distance: 8      # Confirmed: Iverntech motor, 8mm lead
microsteps: 16
full_steps_per_rotation: 200
endstop_pin: !PG9         # Y min (front) — Stop1 — confirmed working
                          # Remove ! if reads triggered at rest
position_min: 0
position_endstop: 0
position_max: 241         # 241 Y travel
homing_speed: 5
homing_retract_dist: 5

[tmc2209 stepper_y]
uart_pin: PD11
run_current: 1.060
hold_current: 0.500
stealthchop_threshold: 0
interpolate: True

# =============================================================================
# SPINDLE Z AXIS  ->  MOTOR2  |  Iverntech integrated motor, confirmed 8mm lead
# Homes to min (bottom = Z0). Z increases upward. Z150 = fully raised.
# Homing endstop : Z min (bottom) = Stop2 (PG10)
# Safety endstop : Z upper limit  = Stop3 (PG11) [filament_switch_sensor below]
# Safety endstop : Z lower limit  = Stop4 (PG12) [filament_switch_sensor below]
#
# Z coordinate system:
#   Z = 0   -> spindle at lowest point (home position)
#   Z = 150 -> spindle fully raised (maximum clearance)
# =============================================================================
[stepper_z]
step_pin: PF11
dir_pin: PG3
enable_pin: !PG5
rotation_distance: 8
microsteps: 16
full_steps_per_rotation: 200

endstop_pin: !PG10
position_min: 0
position_endstop: 0
position_max: 150
homing_speed: 5
homing_retract_dist: 0

[tmc2209 stepper_z]
uart_pin: PC6
run_current: 1.500
hold_current: 0.500
stealthchop_threshold: 0
interpolate: True

# =============================================================================
# PASTE DISPENSER Z AXIS  ->  MOTOR3  |  Independent carriage, own Z rail
# Configured as manual_stepper — moves independently from spindle Z.
# Endstop NOT YET INSTALLED. Homing macro disabled until sensor added.
#
# *** OCTOPUS PRO V1.1 SPECIFIC ***
# MOTOR3 enable pin is PA2 on the Pro V1.1 — NOT PA0.
#
# Future homing  : Paste Z min = Stop7 (PG15) — not yet installed
# =============================================================================
[manual_stepper paste_z]
step_pin: PG4
dir_pin: PC1              # <- Add ! if paste Z moves in wrong direction
enable_pin: !PA2          # Pro V1.1 specific — PA2, NOT PA0
rotation_distance: 8      # Assumed 8mm lead — verify against actual hardware
microsteps: 16
full_steps_per_rotation: 200
velocity: 8
accel: 80
#endstop_pin: !PG15       # <- UNCOMMENT when sensor installed on Stop7

[tmc2209 manual_stepper paste_z]
uart_pin: PC7
run_current: 1.060
stealthchop_threshold: 0
interpolate: True

# =============================================================================
# PASTE SYRINGE EXTRUDER  ->  MOTOR4  |  Lead screw drives syringe plunger
# Configured as manual_stepper — no heater or thermistor required.
#
# CALIBRATE rotation_distance before use:
#   1. Mark syringe plunger with tape
#   2. Run: MANUAL_STEPPER STEPPER=paste_extruder ENABLE=1 MOVE=10 SPEED=2
#   3. Measure actual plunger travel with calipers
#   4. new_rotation_distance = 8 x (10 / actual_mm)
# =============================================================================
[manual_stepper paste_extruder]
step_pin: PF9
dir_pin: PF10             # <- Add ! if paste retracts when it should extrude
enable_pin: !PG2
rotation_distance: 8      # *** MUST CALIBRATE before use ***
microsteps: 16
full_steps_per_rotation: 200
velocity: 3
accel: 30

[tmc2209 manual_stepper paste_extruder]
uart_pin: PF2
run_current: 0.800
stealthchop_threshold: 999999
interpolate: True

# =============================================================================
# SPINDLE CONTROL
#   PA8 (FAN0 bottom pin) -> EN pin on Daedalus speed controller
#   PE5 (FAN1 bottom pin) -> SV pin on Daedalus speed controller
#   FAN6 GND              -> GND on speed controller
#   VF0 -> 10kΩ -> PA8   -> pull-up to prevent startup spin
#
# EN PIN LOGIC (INVERTED on this controller):
#   PA8 VALUE=0 -> PA8 outputs HIGH (~5V) -> EN HIGH -> spindle STOPPED
#   PA8 VALUE=1 -> PA8 outputs LOW  (~0V) -> EN LOW  -> spindle RUNS
#
# Therefore:
#   value: 0        = spindle disabled at startup (safe default)
#   shutdown_value: 0 = spindle disabled on any Klipper error
#   M3 sets VALUE=1 -> PA8 LOW -> EN LOW -> spindle runs
#   M5 sets VALUE=0 -> PA8 HIGH -> EN HIGH -> spindle stops
#
# *** VFAN jumper MUST be set to 5V — NOT 12V or VIN ***
# *** Octopus GND must connect to controller GND ***
# *** VERIFY cycle_time against your controller datasheet ***
#   Standard DC controller : cycle_time: 0.001  (1 kHz)
#   RC-style ESC           : cycle_time: 0.020  (50 Hz)
# =============================================================================
[output_pin spindle_relay]
pin: PA8
# REMOVE 'value: 0' to prevent Klipper from actively locking the timer register
shutdown_value: 0         # Keeps the emergency shutdown safety intact

[output_pin spindle_pwm]
pin: PE5
pwm: True
# value: 0                # REMOVE this line as well
shutdown_value: 0
cycle_time: 0.020         # 0.020 (50Hz) is excellent and light on the MCU


# =============================================================================
# SAFETY OVER-TRAVEL SENSORS
# These halt all motion immediately if triggered.
# All use ! (inverted, no internal pull-up) matching confirmed wiring.
# Remove ! from any pin that reads triggered at rest.
# =============================================================================
[filament_switch_sensor x_max_limit]
switch_pin: !PG13         # X max (right) — Stop5
pause_on_runout: False
runout_gcode:
  { action_emergency_stop("!!! X AXIS OVER-TRAVEL — MAX ENDSTOP HIT !!!") }

[filament_switch_sensor y_max_limit]
switch_pin: !PG14         # Y max (back) — Stop6
pause_on_runout: False
runout_gcode:
  { action_emergency_stop("!!! Y AXIS OVER-TRAVEL — MAX ENDSTOP HIT !!!") }

[filament_switch_sensor spindle_z_upper_limit]
switch_pin: !PG11         # Spindle Z upper (top of carriage) — Stop3
pause_on_runout: False
runout_gcode:
  { action_emergency_stop("!!! SPINDLE Z OVER-TRAVEL — UPPER LIMIT HIT !!!") }

[filament_switch_sensor spindle_z_lower_limit]
switch_pin: !PG12         # Spindle Z lower (bottom of carriage) — Stop4
pause_on_runout: False
runout_gcode:
  { action_emergency_stop("!!! SPINDLE Z OVER-TRAVEL — LOWER LIMIT HIT !!!") }


[gcode_macro M0]
gcode:
  PAUSE

[gcode_macro M8]
description: Coolant On — ignored
gcode:
  { action_respond_info("M8 coolant on — ignored") }

[gcode_macro M9]
description: Coolant Off — ignored
gcode:
  { action_respond_info("M9 coolant off — ignored") }

[gcode_macro T2]
description: Tool 2 — not configured
gcode:
  { action_respond_info("T2 called — not configured, ignored") }

[gcode_macro TURN_OFF_HEATERS]
description: Turn off heaters — ignored, no heaters on this machine
gcode:
  { action_respond_info("TURN_OFF_HEATERS ignored — no heaters configured") }

[gcode_macro G94]
description: Feed per minute mode — acknowledged, ignored
gcode:
  { action_respond_info("G94 feed per minute mode — ignored") }

[gcode_macro G92]
rename_existing: G92.1
gcode:
  G92.1 {rawparams}
  SAVE_GCODE_STATE NAME=work_zero


# =============================================================================
# HOMING SEQUENCE
# Order: Z first (raise spindle for clearance), then X, then Y.
# =============================================================================
[homing_override]
axes: xyz
gcode:
  G90
  {% if 'z' in printer.toolhead.homed_axes %}
    G0 Z10 F480
  {% endif %}

  {% if 'Z' in params or params|length == 0 %}
    G28 Z
    G4 P100
    G0 Z10 F480
  {% endif %}

  {% if 'X' in params or params|length == 0 %}
    G28 X
    G0 X5 F900
  {% endif %}

  {% if 'Y' in params or params|length == 0 %}
    G28 Y
    G0 Y5 F900
  {% endif %}

[gcode_macro SAVE_OFFSET]
gcode:
  SAVE_GCODE_STATE NAME=work_zero

[gcode_macro RESTORE_OFFSET]  
gcode:
  RESTORE_GCODE_STATE NAME=work_zero MOVE=0


# =============================================================================
# TOOL CHANGE MACROS
# T0 = CNC Spindle      (reference — no offset)
# T1 = Paste Dispenser  (X offset -74.098mm)
# =============================================================================
[gcode_macro T0]
description: Activate CNC Spindle (Tool 0 — reference, no offset)
gcode:
  M5
  SAVE_GCODE_STATE NAME=tc_state
  G91
  G0 Z10 F480
  G90
  SET_GCODE_OFFSET X=0 Y=0 Z=0
  RESTORE_GCODE_STATE NAME=tc_state MOVE=0
  { action_respond_info("Tool 0 (CNC Spindle) active — no coordinate offset") }

[gcode_macro T1]
description: Activate Paste Dispenser (Tool 1 — X offset -74.098mm)
gcode:
  M5
  SAVE_GCODE_STATE NAME=tc_state
  G91
  G0 Z10 F480
  G90
  MANUAL_STEPPER STEPPER=paste_z ENABLE=1
  SET_GCODE_OFFSET X=-74.098 Y=0 Z=0
  RESTORE_GCODE_STATE NAME=tc_state MOVE=0
  { action_respond_info("Tool 1 (Paste Dispenser) active — X offset -74.098mm") }

# =============================================================================
# SPINDLE ON / OFF  (M3 / M5)
#
# Usage:
#   M3 S75    -> spindle on at 75% speed
#   M3        -> spindle on at default 50% speed
#   M5        -> spindle off
#
# S value is 0-100 (percent).
#
# EN PIN LOGIC REMINDER:
#   VALUE=1 -> PA8 LOW  -> EN LOW  -> spindle RUNS
#   VALUE=0 -> PA8 HIGH -> EN HIGH -> spindle STOPS
# =============================================================================
[gcode_macro M3]
description: Spindle On — S=RPM (5000-10000)
gcode:
  {% set MIN_RPM = 5000 %}
  {% set MAX_RPM = 10000 %}
  {% set MIN_PWM = 0.1 %}
  {% set MAX_PWM = 0.5 %}
  {% set RPM = [([params.S|default(7000)|float, MIN_RPM]|max), MAX_RPM]|min %}
  {% set PWM = MAX_PWM - ((RPM - MIN_RPM) / (MAX_RPM - MIN_RPM)) * (MAX_PWM - MIN_PWM) %}
  {% set PWM = [PWM, 0.5]|min %}
  {% set PWM = [PWM, 0.1]|max %}
  SET_PIN PIN=spindle_pwm VALUE={PWM}
  SET_PIN PIN=spindle_relay VALUE=1
  { action_respond_info("Spindle ON at %.0f RPM" % RPM) }

[gcode_macro M5]
description: Spindle Off
gcode:
  SET_PIN PIN=spindle_relay VALUE=0     # 0 -> PA8 HIGH -> EN HIGH -> spindle stops
  SET_PIN PIN=spindle_pwm VALUE=0       # Clear speed signal
  { action_respond_info("Spindle OFF") }

# =============================================================================
# PASTE Z MACROS
# =============================================================================
[gcode_macro PASTE_Z_HOME]
description: Home paste Z — DO NOT USE until proximity sensor installed on Stop7
gcode:
  # Once sensor installed on PG15 (Stop7):
  #   1. Uncomment endstop_pin: !PG15 in [manual_stepper paste_z] above
  #   2. Delete action_raise_error line below
  #   3. Uncomment the four MANUAL_STEPPER lines below
  { action_raise_error("Paste Z endstop NOT installed. See PASTE_Z_HOME comments.") }
  # MANUAL_STEPPER STEPPER=paste_z ENABLE=1
  # MANUAL_STEPPER STEPPER=paste_z MOVE=-200 SPEED=8 STOP_ON_ENDSTOP=1
  # MANUAL_STEPPER STEPPER=paste_z SET_POSITION=0
  # MANUAL_STEPPER STEPPER=paste_z MOVE=5 SPEED=8

[gcode_macro PASTE_Z_MOVE]
description: Move paste Z to absolute position. Usage: PASTE_Z_MOVE POS=20 SPD=8
gcode:
  {% set POS = params.POS|default(0)|float %}
  {% set SPD = params.SPD|default(8)|float %}
  MANUAL_STEPPER STEPPER=paste_z ENABLE=1 MOVE={POS} SPEED={SPD}

[gcode_macro PASTE_Z_PARK]
description: Raise paste Z to full clearance height
gcode:
  MANUAL_STEPPER STEPPER=paste_z ENABLE=1 MOVE=140 SPEED=8

# =============================================================================
# PASTE EXTRUSION MACROS
# =============================================================================
[gcode_macro PASTE_EXTRUDE]
description: Extrude paste. Usage: PASTE_EXTRUDE DIST=1 SPD=3
gcode:
  {% set DIST = params.DIST|default(1)|float %}
  {% set SPD  = params.SPD|default(3)|float %}
  MANUAL_STEPPER STEPPER=paste_extruder ENABLE=1 MOVE={DIST} SPEED={SPD}

[gcode_macro PASTE_RETRACT]
description: Retract paste. Usage: PASTE_RETRACT DIST=0.5 SPD=3
gcode:
  {% set DIST = params.DIST|default(0.5)|float %}
  {% set SPD  = params.SPD|default(3)|float %}
  MANUAL_STEPPER STEPPER=paste_extruder ENABLE=1 MOVE=-{DIST} SPEED={SPD}

# =============================================================================
# REQUIRED KLIPPER SECTIONS
# =============================================================================
[pause_resume]

[display_status]

[idle_timeout]
timeout: 300

[virtual_sdcard]
path: ~/printer_data/gcodes

[respond]
default_type: echo

# =============================================================================
# COMPLETE PIN REFERENCE — BTT Octopus Pro V1.1 (STM32F446)
# =============================================================================
#
# MOTOR STEP/DIR/EN/UART:
#   MOTOR0 (X)              STEP=PF13  DIR=PF12  EN=!PF14  UART=PC4
#   MOTOR1 (Y)              STEP=PG0   DIR=PG1   EN=!PF15  UART=PD11
#   MOTOR2 (Spindle Z)      STEP=PF11  DIR=PG3   EN=!PG5   UART=PC6
#   MOTOR3 (Paste Z)        STEP=PG4   DIR=PC1   EN=!PA2   UART=PC7
#     *** Pro V1.1 uses PA2 — NOT PA0 ***
#   MOTOR4 (Paste Extruder) STEP=PF9   DIR=PF10  EN=!PG2   UART=PF2
#
# STOP PIN ASSIGNMENTS:
#   Stop0  PG6  — X min (left)           homing endstop       !PG6
#   Stop1  PG9  — Y min (front)          homing endstop       !PG9
#   Stop2  PG10 — Spindle Z min (bottom) homing endstop       !PG10
#   Stop3  PG11 — Spindle Z upper        safety limit         !PG11
#   Stop4  PG12 — Spindle Z lower        safety limit         !PG12
#   Stop5  PG13 — X max (right)          safety limit         !PG13
#   Stop6  PG14 — Y max (back)           safety limit         !PG14
#   Stop7  PG15 — Paste Z min (future)   homing endstop       !PG15
#
#   NOTE: PG7 and PG8 are NOT valid endstop pins on this board.
#   Paste Z upper and lower safety limits not currently installed.
#
# FAN / OUTPUT PINS:
#   PA8 = FAN0 bottom pin -> EN on Daedalus speed controller
#     VALUE=0 -> PA8 HIGH -> EN HIGH -> spindle STOPPED (default/shutdown)
#     VALUE=1 -> PA8 LOW  -> EN LOW  -> spindle RUNS
#   PE5 = FAN1 bottom pin -> SV on Daedalus speed controller (PWM speed)
#   FAN6 GND -> GND on speed controller
#   VF0 -> 10kΩ -> PA8 (pull-up, prevents startup spin)
#   *** VFAN jumper MUST be set to 5V ***
#   *** Octopus GND must connect to controller GND ***
# =============================================================================